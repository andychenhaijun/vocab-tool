name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      # 显式允许 root 运行，防止 buildozer 权限报错
      options: --user root
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Fix permissions
      run: chmod -R 777 .

    - name: Build APK
      env:
        # 【关键修复】该环境变量会跳过 buildozer 对 root 权限的交互式询问
        BUILDOZER_ALLOW_ROOT: 1
      run: |
        # 移除 buildozer init 以免覆盖现有的 buildozer.spec 配置
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vocab-tool-apk
        path: ./bin/*.apk
