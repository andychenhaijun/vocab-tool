name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set permissions
      # 赋予当前工作目录最高读写权限，防止后期打包生成文件时报 Permission Denied
      run: chmod -R 777 .

    - name: Build APK
      # 【核心修复点】必须在运行打包命令的当前 Step 下，显式声明 env
      env:
        BUILDOZER_ALLOW_ROOT: "1"
      run: |
        # 直接全速编译打包，绕过 root 权限下的交互式弹窗询问
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vocab-tool-apk
        path: ./bin/*.apk
