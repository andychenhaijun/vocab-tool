name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set permissions
      # 直接使用 chmod 确保构建环境具备读写权限，避免因 $USER 变量未定义导致的错误 [cite: 3]
      run: chmod -R 777 .

    - name: Build APK
      env:
        # 添加此环境变量以绕过 root 用户检查时的交互式询问 [cite: 3]
        BUILDOZER_ALLOW_ROOT: 1
      run: |
        # 移除 buildozer init 以免覆盖现有的 buildozer.spec 配置 [cite: 3]
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vocab-tool-apk
        path: ./bin/*.apk
