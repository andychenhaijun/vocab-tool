name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set permissions
      run: chmod -R 777 .

    - name: Build APK
      env:
        # 【关键修复】设置此环境变量以绕过 root 权限下的交互式询问
        BUILDOZER_ALLOW_ROOT: 1
      run: |
        # 不要在这里运行 buildozer init，否则会覆盖你现有的配置
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vocab-tool-apk
        path: ./bin/*.apk
