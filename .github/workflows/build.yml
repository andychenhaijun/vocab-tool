name: Build APK with Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 终极修复：直接将允许 root 运行的环境变量提升至整个工作流的最高全局级别
env:
  BUILDOZER_ALLOW_ROOT: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer:latest
      options: --user root
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set permissions
      run: chmod -R 777 .

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vocab-tool-apk
        path: ./bin/*.apk
